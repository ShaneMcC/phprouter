version: 2
updates:
- package-ecosystem: composer
  directory: /
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  cooldown:
    default-days: 32 # Slightly over 1 month
  groups:
    composer-minor-patch:
      update-types:
      - minor
      - patch
    composer-major:
      update-types:
      - major
